# render.yaml — Render deployment config
# Commit this file to your GitHub repo root

services:
  - type: web
    name: studymarket
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        sync: false        # Set manually in Render dashboard
      - key: SECRET_KEY
        generateValue: true
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
