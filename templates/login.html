<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — StudyMarket</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
<nav class="navbar">
  <div class="container">
    <a class="navbar-brand" href="{{ url_for('product.index') }}">📚 Study<span>Market</span></a>
    <div class="nav-links">
      <a href="{{ url_for('auth.register') }}">Register</a>
    </div>
  </div>
</nav>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="container" style="padding-top:1rem">
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

<main style="display:flex;align-items:center;justify-content:center;padding:3rem 1rem">
  <div class="form-card" style="width:100%">
    <div style="text-align:center;margin-bottom:1.5rem">
      <div style="font-size:3rem">🎓</div>
      <h2>Welcome Back</h2>
      <p style="color:var(--muted);font-size:.9rem;margin-top:.3rem">Log in to access your study materials</p>
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required placeholder="you@college.edu">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:.5rem">
        Login →
      </button>
    </form>

    <p style="text-align:center;margin-top:1.25rem;font-size:.9rem;color:var(--muted)">
      Don't have an account?
      <a href="{{ url_for('auth.register') }}" style="font-weight:700">Register here</a>
    </p>
  </div>
</main>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
